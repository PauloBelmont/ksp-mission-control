version: '3.8'
services:
  api:
    build: ./fastapi
    container_name: ksp_api
    ports:
      - "8000:8000"
    environment:
      - KRPC_ADDRESS=host.docker.internal
      - KRPC_RPC_PORT=5000
      - KRPC_STREAM_PORT=5001

  dashboard:
    build: ./streamlit
    container_name: ksp_dashboard
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000/telemetry
      - POLL_INTERVAL=1.0
